version: '3'

services:
  db:
    image: postgres
    expose:
      - 5432
    volumes:
      - /home/xavier/dev/data/mundial2026/pg_data:/var/lib/postgresql/data
      - /home/xavier/dev/data/mundial2026/pg_backups:/pg_backups
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

  web:
    build: .
    volumes:
      - /home/xavier/dev/mundial2026/euro2024:/opt/euro2024
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - db
    command: uwsgi --ini /opt/euro2024/uwsgi.ini
    # command: python /opt/euro2024/manage.py runserver 0.0.0.0:8000

volumes:
  pg_data: {}
  pg_backups: {}
